name: Wakatime Stats

on:
  # run automatically every 24 hours
  schedule:
    - cron: "42 0 * * *" 
  
  # allows to manually run the job at any time
  workflow_dispatch:
  
  # run on every push on the master branch
  push:
    branches: [ master ]
    paths:
      - '.github/workflows/WakatimeStats.yml'

jobs:
  wakatime:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          LOCALE: "zh"
          SHOW_UPDATED_DATE: "True"
          UPDATED_DATE_FORMAT: "%d-%m-%Y %H:%M:%S"
          SHOW_LINES_OF_CODE: "True"
          SYMBOL_VERSION: "3"
          IGNORED_REPOS: "apps.apple.com-1,AscNetTJ,casdoor,end_7z,GCProto,GCResource,GenshinImpact-Client-Version,HoYoStudio,rafi1212122-PemukulPaku,SRProto,SRResource,WinFormsAppCalculator,WutheringWaves-UIResources"
